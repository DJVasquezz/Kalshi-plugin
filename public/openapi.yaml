openapi: 3.0.1
info:
  title: Kalshi Mention Markets
  version: 1.0

servers:
  - url: https://project-nt8j9.vercel.app/

paths:
  /api/market:
    get:
      summary: Get live Kalshi markets
      description: Returns open Kalshi markets with price fields
      parameters:
        - name: q
          in: query
          schema:
            type: string
            description: Optional keyword to filter markets
      responses:
        "200":
          description: List of open markets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
                    ticker:
                      type: string
                    expiration:
                      type: string
                      format: date-time
                    last_price:
                      type: number
                    yes_bid:
                      type: number
                    yes_ask:
                      type: number
                    no_bid:
                      type: number
                    no_ask:
                      type: number