openapi: 3.0.1
info:
  title: Kalshi Mention Markets
  version: 1.0

servers:
  - url: https://kalshi-plugin-davidvasquez47-8634s-projects.vercel.app/

paths:
  /api/markets:
    get:
      summary: Get mention markets
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: min_price
          in: query
          schema:
            type: number
        - name: max_price
          in: query
          schema:
            type: number
        - name: min_hits
          in: query
          schema:
            type: integer
        - name: max_misses
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Market data